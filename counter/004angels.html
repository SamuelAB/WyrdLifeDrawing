<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Pose Timer - Wyrd Life Drawing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a08;
            color: #e8d5b5;
            font-family: 'Georgia', serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        /* START SCREEN */
        .start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(ellipse at center, #2a2018 0%, #1a1510 70%);
            padding: 24px;
            text-align: center;
        }

        .start-screen h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            color: #d4a84b;
            letter-spacing: 4px;
            margin-bottom: 8px;
            text-shadow: 0 0 40px rgba(212, 168, 75, 0.3);
        }

        .start-screen .event-name {
            font-size: clamp(1.2rem, 3vw, 2rem);
            color: #a08660;
            margin-bottom: 48px;
            font-style: italic;
        }

        .start-screen .pose-count {
            font-size: 1rem;
            color: #7a6a50;
            margin-bottom: 32px;
        }

        .start-btn {
            background: #d4a84b;
            color: #1a1510;
            border: none;
            padding: 20px 64px;
            font-size: 1.4rem;
            font-family: 'Georgia', serif;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            box-shadow: 0 0 40px rgba(212, 168, 75, 0.2);
        }

        .start-btn:hover, .start-btn:active {
            background: #e8be65;
            box-shadow: 0 0 60px rgba(212, 168, 75, 0.4);
        }

        /* TIMER SCREEN */
        .timer-screen {
            display: none;
            position: relative;
            height: 100vh;
            width: 100vw;
        }

        .pose-image-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a08;
        }

        .pose-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .pose-image-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #5a4a30;
            font-size: 1.2rem;
            gap: 12px;
        }

        .pose-image-placeholder .pose-number {
            font-size: 4rem;
            color: #d4a84b;
            font-weight: bold;
        }

        /* TIMER OVERLAY - bottom right corner, always visible over image */
        .timer-overlay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            z-index: 10;
            pointer-events: none;
        }

        .timer-display {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: bold;
            color: #d4a84b;
            text-shadow:
                0 0 40px rgba(0, 0, 0, 0.9),
                0 0 20px rgba(0, 0, 0, 0.9),
                0 4px 12px rgba(0, 0, 0, 0.9),
                0 0 60px rgba(212, 168, 75, 0.3);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .timer-display.warning {
            color: #e87040;
            text-shadow:
                0 0 40px rgba(0, 0, 0, 0.9),
                0 0 20px rgba(0, 0, 0, 0.9),
                0 4px 12px rgba(0, 0, 0, 0.9),
                0 0 60px rgba(232, 112, 64, 0.4);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .pose-info {
            text-align: right;
            line-height: 1.3;
        }

        .pose-info .pose-label {
            font-size: clamp(1rem, 3vw, 1.6rem);
            color: #a08660;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
        }

        .pose-info .pose-duration {
            font-size: clamp(0.8rem, 2vw, 1.1rem);
            color: #7a6a50;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
        }

        /* PROGRESS BAR */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: rgba(212, 168, 75, 0.15);
            z-index: 10;
        }

        .progress-fill {
            height: 100%;
            background: #d4a84b;
            transition: width 1s linear;
        }

        .progress-fill.warning {
            background: #e87040;
        }

        /* CONTROLS - top center, hidden until tap */
        .controls {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .timer-screen:hover .controls,
        .timer-screen:active .controls,
        .controls.visible {
            opacity: 1;
            pointer-events: all;
        }

        .ctrl-btn {
            background: rgba(212, 168, 75, 0.2);
            border: 1px solid rgba(212, 168, 75, 0.4);
            color: #d4a84b;
            padding: 12px 24px;
            font-size: 1rem;
            font-family: 'Georgia', serif;
            cursor: pointer;
            border-radius: 4px;
            backdrop-filter: blur(8px);
        }

        .ctrl-btn:hover, .ctrl-btn:active {
            background: rgba(212, 168, 75, 0.4);
        }

        /* TRANSITION */
        .transition-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 8, 0.95);
            z-index: 20;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }

        .transition-overlay.active {
            display: flex;
        }

        .transition-text {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: #d4a84b;
            text-align: center;
        }

        .transition-next {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            color: #a08660;
            font-style: italic;
        }

        /* END SCREEN */
        .end-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(ellipse at center, #2a2018 0%, #1a1510 70%);
            text-align: center;
            padding: 24px;
        }

        .end-screen h2 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: #d4a84b;
            margin-bottom: 16px;
        }

        .end-screen p {
            font-size: 1.2rem;
            color: #a08660;
            margin-bottom: 40px;
        }

        /* BREAK SCREEN */
        .break-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, #2a2018 0%, #1a1510 70%);
            z-index: 15;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px;
        }

        .break-overlay.active {
            display: flex;
        }

        .break-overlay h2 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: #d4a84b;
        }

        .break-overlay .break-timer {
            font-size: clamp(3rem, 10vw, 6rem);
            color: #a08660;
            font-variant-numeric: tabular-nums;
        }

        /* Touch-friendly: show controls on tap */
        @media (hover: none) {
            .controls { opacity: 1; pointer-events: all; }
        }
    </style>
</head>
<body>
    <!-- START SCREEN -->
    <div class="start-screen" id="startScreen">
        <h1>WYRD LIFE DRAWING</h1>
        <div class="event-name" id="eventName">Angels</div>
        <div class="pose-count" id="poseCount"></div>
        <button class="start-btn" id="startBtn">START</button>
    </div>

    <!-- TIMER SCREEN -->
    <div class="timer-screen" id="timerScreen">
        <div class="pose-image-container" id="poseContainer"></div>

        <div class="timer-overlay">
            <div class="timer-display" id="timerDisplay">00:00</div>
            <div class="pose-info">
                <div class="pose-label" id="poseLabel"></div>
                <div class="pose-duration" id="poseDuration"></div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="controls" id="controls">
            <button class="ctrl-btn" id="prevBtn">PREV</button>
            <button class="ctrl-btn" id="pauseBtn">PAUSE</button>
            <button class="ctrl-btn" id="nextBtn">NEXT</button>
        </div>

        <div class="transition-overlay" id="transitionOverlay">
            <div class="transition-text" id="transitionText"></div>
            <div class="transition-next" id="transitionNext"></div>
        </div>

        <div class="break-overlay" id="breakOverlay">
            <h2>BREAK</h2>
            <div class="break-timer" id="breakTimer">00:00</div>
        </div>
    </div>

    <!-- END SCREEN -->
    <div class="end-screen" id="endScreen">
        <h2>Thank you!</h2>
        <p>Wyrd Life Drawing</p>
        <button class="start-btn" onclick="location.reload()">RESTART</button>
    </div>

    <script>
    // ============================================================
    //  POSE CONFIGURATION - Edit this for each event
    // ============================================================
    const EVENT_NAME = "Angels";

    const POSES = [
        // duration is in SECONDS (300 = 5 min, 600 = 10 min, 900 = 15 min, 1200 = 20 min, 1800 = 30 min)
        // To add a break, use: { break: true, duration: 600, label: "Break" }

        // --- 5 minute warm-ups ---
        { image: "../images/004angels/pose01.jpg", duration: 300, label: "Pose 1 - 5 min" },
        { image: "../images/004angels/pose02.jpg", duration: 300, label: "Pose 2 - 5 min" },
        { image: "../images/004angels/pose03.jpg", duration: 300, label: "Pose 3 - 5 min" },
        { image: "../images/004angels/pose04.jpg", duration: 300, label: "Pose 4 - 5 min" },

        // --- break ---
        { break: true, duration: 1800, label: "Break - 30 min" },

        // --- 10 minute poses ---
        { image: "../images/004angels/pose05.jpg", duration: 600, label: "Pose 5 - 10 min" },
        { image: "../images/004angels/pose06.jpg", duration: 600, label: "Pose 6 - 10 min" },
        { image: "../images/004angels/pose07.jpg", duration: 600, label: "Pose 7 - 10 min" },

        // --- break ---
        { break: true, duration: 1800, label: "Break - 30 min" },

        // --- 15 minute pose ---
        { image: "../images/004angels/pose08.jpg", duration: 900, label: "Pose 8 - 15 min" },

        // --- longer poses ---
        { image: "../images/004angels/pose09.jpg", duration: 1200, label: "Pose 9 - 20 min" },
        { image: "../images/004angels/pose10.jpg", duration: 1800, label: "Pose 10 - 30 min" },
        { image: "../images/004angels/pose11.jpg", duration: 1800, label: "Pose 11 - 30 min" },
    ];

    // Warning threshold: flash red when this many seconds remain
    const WARNING_SECONDS = 30;

    // Transition pause between poses (milliseconds)
    const TRANSITION_MS = 3000;

    // ============================================================
    //  AUDIO - generates a chime using Web Audio API (no files needed)
    // ============================================================
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playChime() {
        if (!audioCtx) return;

        const now = audioCtx.currentTime;

        // Two-tone chime
        [523.25, 659.25].forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.3, now + i * 0.15);
            gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 1.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now + i * 0.15);
            osc.stop(now + i * 0.15 + 1.5);
        });
    }

    function playEndChime() {
        if (!audioCtx) return;

        const now = audioCtx.currentTime;

        // Three-tone descending chime for pose end
        [783.99, 659.25, 523.25].forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.35, now + i * 0.2);
            gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.2 + 1.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now + i * 0.2);
            osc.stop(now + i * 0.2 + 2);
        });
    }

    // ============================================================
    //  TIMER ENGINE
    // ============================================================
    let currentPoseIndex = 0;
    let timeRemaining = 0;
    let totalTime = 0;
    let timerInterval = null;
    let isPaused = false;

    const $ = id => document.getElementById(id);

    // Count actual poses (not breaks)
    const poseOnlyCount = POSES.filter(p => !p.break).length;
    $('eventName').textContent = EVENT_NAME;
    $('poseCount').textContent = poseOnlyCount + ' poses';

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function showPose(index) {
        const pose = POSES[index];
        if (!pose) {
            endSession();
            return;
        }

        currentPoseIndex = index;
        timeRemaining = pose.duration;
        totalTime = pose.duration;
        isPaused = false;
        $('pauseBtn').textContent = 'PAUSE';

        // Hide transition
        $('transitionOverlay').classList.remove('active');
        $('breakOverlay').classList.remove('active');

        if (pose.break) {
            // Show break screen with controls visible
            $('breakOverlay').classList.add('active');
            $('breakTimer').textContent = formatTime(timeRemaining);
            $('timerDisplay').textContent = formatTime(timeRemaining);
            $('poseLabel').textContent = pose.label;
            $('poseDuration').textContent = formatTime(pose.duration) + ' total';
            $('controls').classList.add('visible');
        } else {
            // Show pose image
            const container = $('poseContainer');
            const img = new Image();
            img.src = pose.image;
            img.className = 'pose-image';
            img.alt = pose.label;

            img.onload = () => {
                container.innerHTML = '';
                container.appendChild(img);
            };

            img.onerror = () => {
                container.innerHTML = '<div class="pose-image-placeholder"><div class="pose-number">' +
                    pose.label + '</div><div>Image not found: ' + pose.image + '</div></div>';
            };

            $('timerDisplay').textContent = formatTime(timeRemaining);
            $('poseLabel').textContent = pose.label;
            $('poseDuration').textContent = formatTime(pose.duration) + ' total';
        }

        updateProgress();
        startTimer();
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);

        timerInterval = setInterval(() => {
            if (isPaused) return;

            timeRemaining--;

            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                playEndChime();
                transitionToNext();
                return;
            }

            $('timerDisplay').textContent = formatTime(timeRemaining);

            // Warning state
            const isWarning = timeRemaining <= WARNING_SECONDS;
            $('timerDisplay').classList.toggle('warning', isWarning);
            $('progressFill').classList.toggle('warning', isWarning);

            // Update break timer if on break
            if (POSES[currentPoseIndex].break) {
                $('breakTimer').textContent = formatTime(timeRemaining);
            }

            updateProgress();
        }, 1000);
    }

    function updateProgress() {
        const pct = ((totalTime - timeRemaining) / totalTime) * 100;
        $('progressFill').style.width = pct + '%';
    }

    function transitionToNext() {
        const nextIndex = currentPoseIndex + 1;
        const nextPose = POSES[nextIndex];

        if (!nextPose) {
            endSession();
            return;
        }

        $('transitionOverlay').classList.add('active');
        $('transitionText').textContent = nextPose.break ? 'Break time' : 'Next pose';
        $('transitionNext').textContent = nextPose.label;

        setTimeout(() => {
            playChime();
            showPose(nextIndex);
        }, TRANSITION_MS);
    }

    function endSession() {
        clearInterval(timerInterval);
        $('timerScreen').style.display = 'none';
        $('endScreen').style.display = 'flex';
    }

    // ============================================================
    //  CONTROLS
    // ============================================================
    $('startBtn').addEventListener('click', () => {
        initAudio();
        playChime();
        $('startScreen').style.display = 'none';
        $('timerScreen').style.display = 'block';
        showPose(0);
    });

    $('pauseBtn').addEventListener('click', () => {
        isPaused = !isPaused;
        $('pauseBtn').textContent = isPaused ? 'RESUME' : 'PAUSE';
    });

    $('nextBtn').addEventListener('click', () => {
        clearInterval(timerInterval);
        $('timerDisplay').classList.remove('warning');
        $('progressFill').classList.remove('warning');
        playChime();
        showPose(currentPoseIndex + 1);
    });

    $('prevBtn').addEventListener('click', () => {
        if (currentPoseIndex > 0) {
            clearInterval(timerInterval);
            $('timerDisplay').classList.remove('warning');
            $('progressFill').classList.remove('warning');
            playChime();
            showPose(currentPoseIndex - 1);
        }
    });

    // Touch: tap to show controls briefly
    let controlsTimeout;
    $('timerScreen').addEventListener('click', (e) => {
        if (e.target.classList.contains('ctrl-btn')) return;
        const controls = $('controls');
        controls.classList.add('visible');
        clearTimeout(controlsTimeout);
        controlsTimeout = setTimeout(() => controls.classList.remove('visible'), 4000);
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            $('pauseBtn').click();
        } else if (e.code === 'ArrowRight') {
            $('nextBtn').click();
        } else if (e.code === 'ArrowLeft') {
            $('prevBtn').click();
        }
    });

    // Prevent iPad sleep
    let wakeLock = null;
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (e) {}
    }
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') requestWakeLock();
    });
    </script>
</body>
</html>
