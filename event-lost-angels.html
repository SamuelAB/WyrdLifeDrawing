    <!-- Lightbox -->
    <div id="lightbox" style="position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;cursor:pointer;">
        <button id="lb-close" style="position:absolute;top:20px;right:24px;background:none;border:none;color:#fff;font-size:2.2rem;cursor:pointer;z-index:2;line-height:1;" aria-label="Close">&times;</button>
        <button id="lb-prev" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:2.5rem;cursor:pointer;z-index:2;padding:8px;" aria-label="Previous">&#8249;</button>
        <button id="lb-next" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:2.5rem;cursor:pointer;z-index:2;padding:8px;" aria-label="Next">&#8250;</button>
        <img id="lb-img" src="" alt="" style="max-width:90vw;max-height:90vh;object-fit:contain;cursor:default;">
    </div>
    <script>
    (function(){
        var lb = document.getElementById('lightbox');
        var lbImg = document.getElementById('lb-img');
        var imgs = [];
        var idx = 0;
        var touchStartX = 0;
        document.querySelectorAll('.gallery-item img').forEach(function(img){
            img.style.cursor = 'pointer';
            img.addEventListener('click', function(e){
                e.stopPropagation();
                var section = img.closest('.event-section');
                imgs = Array.from(section.querySelectorAll('.gallery-item img'));
                idx = imgs.indexOf(img);
                show();
            });
        });
        function show(){
            var src = imgs[idx].src;
            if (!src || src === window.location.href) { src = imgs[idx].getAttribute('src'); }
            lbImg.src = src;
            lbImg.alt = imgs[idx].alt || '';
            lb.style.display = 'flex';
        }
        function close(){ lb.style.display = 'none'; lbImg.src = ''; }
        function prev(){ if(imgs.length){ idx = (idx - 1 + imgs.length) % imgs.length; show(); } }
        function next(){ if(imgs.length){ idx = (idx + 1) % imgs.length; show(); } }
        document.getElementById('lb-close').addEventListener('click', function(e){ e.stopPropagation(); close(); });
        document.getElementById('lb-prev').addEventListener('click', function(e){ e.stopPropagation(); prev(); });
        document.getElementById('lb-next').addEventListener('click', function(e){ e.stopPropagation(); next(); });
        lb.addEventListener('click', close);
        lbImg.addEventListener('click', function(e){ e.stopPropagation(); });
        document.addEventListener('keydown', function(e){
            if(lb.style.display === 'flex'){
                if(e.key === 'Escape') close();
                else if(e.key === 'ArrowLeft') prev();
                else if(e.key === 'ArrowRight') next();
            }
        });
        lb.addEventListener('touchstart', function(e){ touchStartX = e.changedTouches[0].clientX; }, {passive:true});
        lb.addEventListener('touchend', function(e){
            var dx = e.changedTouches[0].clientX - touchStartX;
            if(dx > 50) prev();
            else if(dx < -50) next();
        }, {passive:true});
    })();
    </script>
