<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Forest Nymph life drawing night at Cyber Love Garden, December 7, 2025. Photos and details from this Wyrd Life Drawing event.">
    <meta property="og:title" content="Forest Nymph / Fée des Bois — Wyrd Life Drawing">
    <meta property="og:description" content="Forest Nymph life drawing night at Cyber Love Garden, December 2025.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="en_CA">
    <meta property="og:locale:alternate" content="fr_CA">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .event-hero {
            position: relative;
            width: 100%;
            height: 60vh;
            min-height: 400px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .event-hero-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
        }
        .event-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #0a0a0a 0%, rgba(10,10,10,0.4) 50%, rgba(10,10,10,0.2) 100%);
        }
        .event-hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem 1rem 3rem;
            max-width: 800px;
        }
        .event-hero-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            color: #BFFF00;
            margin-bottom: 0.5rem;
        }
        .event-hero-meta {
            font-family: 'Inter', sans-serif;
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .event-back {
            display: inline-block;
            margin: 2rem auto;
            padding: 0.5rem 1rem;
            color: #BFFF00;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .event-back:hover { opacity: 0.7; }
        .event-back::before { content: "\2190 "; }
        .event-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 1.5rem 3rem;
        }
        .event-section-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.5rem;
            color: #BFFF00;
            margin-bottom: 2rem;
            text-align: center;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .gallery-item {
            aspect-ratio: 3 / 4;
            overflow: hidden;
            border-radius: 4px;
            background: #1a1a1a;
        }
        .gallery-item.landscape {
            aspect-ratio: 3 / 2;
            grid-column: span 2;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            transition: transform 0.4s ease;
        }
        .gallery-item:hover img { transform: scale(1.03); }
        @media (max-width: 900px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
            .gallery-item.landscape { grid-column: span 2; }
        }
        @media (max-width: 550px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .gallery-item.landscape { grid-column: span 1; }
            .event-hero { height: 50vh; min-height: 300px; }
        }
    </style>
</head>
