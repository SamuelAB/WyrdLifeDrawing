<head>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RX9WTQJSB7"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-RX9WTQJSB7');</script>
    <style>
        .event-hero {
            position: relative;
            width: 100%;
            height: 60vh;
            min-height: 400px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .event-hero-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
        }
        .event-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #0a0a0a 0%, rgba(10,10,10,0.4) 50%, rgba(10,10,10,0.2) 100%);
        }
        .event-hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem 1rem 3rem;
            max-width: 800px;
        }
        .event-hero-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            color: #BFFF00;
            margin-bottom: 0.5rem;
        }
        .event-hero-meta {
            font-family: 'Inter', sans-serif;
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .event-back {
            display: inline-block;
            margin: 2rem auto;
            padding: 0.5rem 1rem;
            color: #BFFF00;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .event-back:hover {
            opacity: 0.7;
        }
        .event-back::before {
            content: "\2190 ";
        }
        .event-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 1.5rem 4rem;
        }
        .event-section-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.5rem;
            color: #BFFF00;
            margin-bottom: 2rem;
            text-align: center;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .gallery-item {
            aspect-ratio: 3 / 4;
            overflow: hidden;
            border-radius: 4px;
            background: #1a1a1a;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            transition: transform 0.4s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.03);
        }
        @media (max-width: 900px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 550px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
            .event-hero {
                height: 50vh;
                min-height: 300px;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="nav" id="nav">
        <a href="index.html" class="nav-logo">

        </a>
        <button class="nav-toggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
            <li><a href="index.html#about" data-en="About" data-fr="&Agrave; propos">About</a></li>
            <li><a href="index.html#events" data-en="Events" data-fr="&Eacute;v&eacute;nements">Events</a></li>
            <li><a href="index.html#team" data-en="Team" data-fr="&Eacute;quipe">Team</a></li>
            <li><a href="index.html#contact" data-en="Contact" data-fr="Contact">Contact</a></li>
        </ul>
        <button class="lang-toggle" id="langToggle" aria-label="Toggle language">FR</button>
    </nav>

    <!-- Hero -->
    <section class="event-hero">
        <img src="images/magical-girl-2.jpg" alt="Alice in Wonderland Life Drawing Night" class="event-hero-img">
        <div class="event-hero-overlay"></div>
        <div class="event-hero-content">
            <h1 class="event-hero-title" data-en="Alice in Wonderland" data-fr="Alice au pays des merveilles">Alice in Wonderland</h1>
            <p class="event-hero-meta">
                <span data-en="February 2026" data-fr="Février 2026">February 2026</span><br>
                <span>Eliza Faulkner</span>
            </p>
        </div>
    </section>

    <!-- Back link -->
    <div class="event-section" style="padding-bottom: 0;">
        <a href="index.html#events" class="event-back" data-en="Back to all events" data-fr="Retour aux événements">Back to all events</a>
    </div>

    <!-- Gallery -->
    <section class="event-section">
        <h2 class="event-section-title" data-en="Photo Gallery" data-fr="Galerie photos">Photo Gallery</h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="images/magical-girl-2.jpg" alt="Alice in Wonderland" loading="lazy"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <span class="footer-logo">WYRD</span>
                    <p>Montréal, QC</p>
                </div>
                <div class="footer-links">
                    <a href="https://www.instagram.com/wyrdlifedrawing/" target="_blank" rel="noopener">Instagram</a>
                    <a href="https://www.facebook.com/profile.php?id=61583990797266" target="_blank" rel="noopener">Facebook</a>
                    <a href="https://linktr.ee/WyrdLifeDrawing" target="_blank" rel="noopener">Linktree</a>
                </div>
            </div>
            <p class="footer-copy">&copy; 2025&ndash;2026 Wyrd Life Drawing</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
