<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Contact Sheet — Forest Nymph Event + Marketing</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #eee; font-family: 'Segoe UI', sans-serif; padding: 20px; }
h1 { color: #BFFF00; margin-bottom: 6px; font-size: 1.6rem; }
h2 { color: #BFFF00; margin: 40px 0 10px; font-size: 1.2rem; border-bottom: 1px solid #333; padding-bottom: 8px; }
.info { color: #888; margin-bottom: 30px; font-size: 0.9rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; }
.card { background: #1a1a1a; border-radius: 8px; overflow: hidden; border: 2px solid transparent; transition: border-color 0.2s; }
.card:hover { border-color: #BFFF00; }
.card img { width: 100%; height: auto; object-fit: contain; display: block; cursor: pointer; }
.card .label { padding: 10px 14px; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
.card .filename { color: #BFFF00; font-weight: 600; }
.card .index { color: #666; }
</style>
</head>
<body>
<h1>Forest Nymph — Contact Sheet</h1>
<p class="info">Click any image to expand/collapse.</p>

<h2>Event Photos (15)</h2>
<p class="info">Source: 002-Red Wood Elf/Photos/Event/All 2k/ (2K resized versions)</p>
<div class="grid" id="event-grid"></div>

<h2>Marketing / Poster Photos (14)</h2>
<p class="info">Source: 002-Red Wood Elf/Photos/Marketing/</p>
<div class="grid" id="marketing-grid"></div>

<script>
function buildGrid(containerId, photos) {
  const grid = document.getElementById(containerId);
  photos.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${p.path}" alt="${p.label}" loading="lazy">
      <div class="label">
        <span class="filename">${p.label}</span>
        <span class="index">#${i + 1} / ${photos.length}</span>
      </div>`;
    card.querySelector('img').addEventListener('click', function() {
      this.classList.toggle('expanded');
    });
    grid.appendChild(card);
  });
}

// Event photos (using All 2k versions)
const eventBase = '/002-Red Wood Elf/Photos/Event/All 2k/';
const eventPhotos = [];
for (let i = 1; i <= 15; i++) {
  const num = String(i).padStart(4, '0');
  eventPhotos.push({ path: `${eventBase}WyrdLifeDrawing-${num}.jpg`, label: `WyrdLifeDrawing-${num}` });
}
buildGrid('event-grid', eventPhotos);

// Marketing photos
const mktBase = '/002-Red Wood Elf/Photos/Marketing/';
const marketingPhotos = [
  { path: mktBase + 'Event Poster.JPG', label: 'Event Poster' },
  { path: mktBase + 'IMG_4547.JPG', label: 'IMG_4547' },
  { path: mktBase + 'IMG_4548.JPG', label: 'IMG_4548' },
  { path: mktBase + 'IMG_4550.JPG', label: 'IMG_4550' },
  { path: mktBase + 'IMG_4551.JPG', label: 'IMG_4551' },
  { path: mktBase + 'Red-01.png', label: 'Red-01' },
  { path: mktBase + 'Red-02.png', label: 'Red-02' },
  { path: mktBase + 'Red-03.png', label: 'Red-03' },
  { path: mktBase + 'Red-04.png', label: 'Red-04' },
  { path: mktBase + 'Red-05.png', label: 'Red-05' },
  { path: mktBase + 'Red-06.png', label: 'Red-06' },
  { path: mktBase + 'Red-07.png', label: 'Red-07' },
  { path: mktBase + 'Red-08.png', label: 'Red-08' },
  { path: mktBase + 'Wyrd Logo.JPG', label: 'Wyrd Logo' },
];
buildGrid('marketing-grid', marketingPhotos);
</script>
</body>
</html>
