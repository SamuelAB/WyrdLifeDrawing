    <style>
        .event-hero {
            position: relative;
            width: 100%;
            height: 60vh;
            min-height: 400px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .event-hero-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
        }
        .event-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #0a0a0a 0%, rgba(10,10,10,0.4) 50%, rgba(10,10,10,0.2) 100%);
        }
        .event-hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem 1rem 3rem;
            max-width: 800px;
        }
        .event-hero-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            color: #BFFF00;
            margin-bottom: 0.5rem;
        }
        .event-hero-meta {
            font-family: 'Inter', sans-serif;
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .event-hero-collab {
            font-family: 'Inter', sans-serif;
            color: rgba(255,255,255,0.6);
            font-size: 0.95rem;
            font-style: italic;
            margin-top: 0.5rem;
        }
        .event-ticket-cta {
            margin-top: 1.5rem;
        }
        .event-ticket-cta .btn {
            font-size: 1.1rem;
            padding: 16px 48px;
        }
        .event-back {
            display: inline-block;
            margin: 2rem auto;
            padding: 0.5rem 1rem;
            color: #BFFF00;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .event-back:hover { opacity: 0.7; }
        .event-back::before { content: "\2190 "; }
        .event-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 1.5rem 3rem;
        }
        .event-section-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.5rem;
            color: #BFFF00;
            margin-bottom: 2rem;
            text-align: center;
        }
        .poster-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .gallery-item {
            overflow: hidden;
            border-radius: 4px;
            background: #1a1a1a;
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.4s ease;
        }
        .gallery-item:hover img { transform: scale(1.03); }
        @media (max-width: 900px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 550px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .event-hero { height: 50vh; min-height: 300px; }
        }
    </style>
</head>

    <script src="js/main.js"></script>

    <!-- Lightbox -->
    <div id="lightbox" style="position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;cursor:pointer;">
        <button id="lb-close" style="position:absolute;top:20px;right:24px;background:none;border:none;color:#fff;font-size:2.2rem;cursor:pointer;z-index:2;line-height:1;" aria-label="Close">&times;</button>
        <button id="lb-prev" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:2.5rem;cursor:pointer;z-index:2;padding:8px;" aria-label="Previous">&#8249;</button>
        <button id="lb-next" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:2.5rem;cursor:pointer;z-index:2;padding:8px;" aria-label="Next">&#8250;</button>
        <img id="lb-img" src="" alt="" style="max-width:90vw;max-height:90vh;object-fit:contain;cursor:default;">
    </div>
    <script>
    (function(){
        var lb = document.getElementById('lightbox');
        var lbImg = document.getElementById('lb-img');
        var imgs = [];
        var idx = 0;
        var touchStartX = 0;

        document.querySelectorAll('.gallery-item img').forEach(function(img){
            img.style.cursor = 'pointer';
            img.addEventListener('click', function(e){
                e.stopPropagation();
                var section = img.closest('.event-section');
                imgs = Array.from(section.querySelectorAll('.gallery-item img'));
                idx = imgs.indexOf(img);
                show();
            });
        });

        function show(){
            var src = imgs[idx].src;
            if (!src || src === window.location.href) {
                src = imgs[idx].getAttribute('src');
            }
            lbImg.src = src;
            lbImg.alt = imgs[idx].alt || '';
            lb.style.display = 'flex';
        }
        function close(){ lb.style.display = 'none'; lbImg.src = ''; }
        function prev(){ if(imgs.length){ idx = (idx - 1 + imgs.length) % imgs.length; show(); } }
        function next(){ if(imgs.length){ idx = (idx + 1) % imgs.length; show(); } }

        document.getElementById('lb-close').addEventListener('click', function(e){ e.stopPropagation(); close(); });
        document.getElementById('lb-prev').addEventListener('click', function(e){ e.stopPropagation(); prev(); });
        document.getElementById('lb-next').addEventListener('click', function(e){ e.stopPropagation(); next(); });
        lb.addEventListener('click', close);
        lbImg.addEventListener('click', function(e){ e.stopPropagation(); });

        document.addEventListener('keydown', function(e){
            if(lb.style.display === 'flex'){
                if(e.key === 'Escape') close();
                else if(e.key === 'ArrowLeft') prev();
                else if(e.key === 'ArrowRight') next();
            }
        });

        lb.addEventListener('touchstart', function(e){ touchStartX = e.changedTouches[0].clientX; }, {passive:true});
        lb.addEventListener('touchend', function(e){
            var dx = e.changedTouches[0].clientX - touchStartX;
            if(dx > 50) prev();
            else if(dx < -50) next();
        }, {passive:true});
    })();
    </script>
</body>
